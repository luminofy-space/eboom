services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eboom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eboom}
      POSTGRES_DB: ${POSTGRES_DB:-eboom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eboom} -d ${POSTGRES_DB:-eboom}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./eboom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-eboom}:${POSTGRES_PASSWORD:-eboom}@postgres:5432/${POSTGRES_DB:-eboom}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-minimum-32-characters-long}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: 4000
      SKIP_EMAIL_VERIFICATION: ${SKIP_EMAIL_VERIFICATION:-1}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: .
      dockerfile: eboom-frontend/Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
